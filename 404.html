<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | Arthur C.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --text: #e8e8ed;
      --text-dim: #888895;
      --accent: #6c5ce7;
      --accent2: #00cec9;
      --border: rgba(255, 255, 255, 0.08);
      --gradient: linear-gradient(135deg, #6c5ce7, #00cec9);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-display: 'Space Grotesk', 'Inter', sans-serif;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
      animation: orbFloat 20s ease-in-out infinite;
    }

    .orb--1 {
      width: 400px;
      height: 400px;
      background: var(--accent);
      top: -15%;
      right: -10%;
    }

    .orb--2 {
      width: 300px;
      height: 300px;
      background: var(--accent2);
      bottom: -15%;
      left: -10%;
      animation-delay: -7s;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -40px) scale(1.05); }
      50% { transform: translate(-20px, 20px) scale(0.95); }
      75% { transform: translate(15px, 30px) scale(1.03); }
    }

    /* Grid background */
    .grid-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 50% 50% at 50% 50%, black, transparent);
      -webkit-mask-image: radial-gradient(ellipse 50% 50% at 50% 50%, black, transparent);
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 32px;
    }

    .error-code {
      font-family: var(--font-display);
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 700;
      line-height: 1;
      background: var(--gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
      letter-spacing: -0.04em;
    }

    .error-title {
      font-family: var(--font-display);
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      font-weight: 600;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    .error-text {
      color: var(--text-dim);
      font-size: 1rem;
      max-width: 400px;
      margin: 0 auto 40px;
      line-height: 1.6;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      border-radius: 50px;
      background: var(--gradient);
      color: #fff;
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 4px 24px rgba(108, 92, 231, 0.3);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                  box-shadow 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .back-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(108, 92, 231, 0.45);
    }

    .back-link svg {
      width: 18px;
      height: 18px;
    }

    ::selection {
      background: rgba(108, 92, 231, 0.3);
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="orb orb--1"></div>
  <div class="orb orb--2"></div>
  <div class="grid-bg"></div>

  <div class="content">
    <div class="error-code">404</div>
    <h1 class="error-title">Page introuvable</h1>
    <p class="error-text">Cette page n'existe pas ou a &eacute;t&eacute; d&eacute;plac&eacute;e. Retournez &agrave; l'accueil pour explorer mon portfolio.</p>
    <a href="/" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Retour &agrave; l'accueil
    </a>
  </div>
</body>
</html>
